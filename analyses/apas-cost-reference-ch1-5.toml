# APAS Cost Reference — Chapters 1–5
#
# Extracted from APAS study materials. Each entry cites the textbook reference
# (CS = Cost Specification, Alg = Algorithm, DT = Data Type, Thm = Theorem).
#
# Notation:
#   n = |a| or max(|a|, |b|)
#   m = min(|a|, |b|)
#   lg = log base 2
#   W(f(x)) = work of applying f to x
#   S(f(x)) = span of applying f to x
#
# This file is the single source of truth for "what does APAS say" for Ch1-5.
# Generated once, human-reviewed, then frozen.

# ---------------------------------------------------------------------------
# Ch2: Parallelism (Def 2.1 work/span composition, Ex 2.7, Ex 2.8)
# ---------------------------------------------------------------------------

[[cost_spec]]
ref = "Ch2 Def 2.1"
chapter = 2
description = "Work and span composition rules for sequential and parallel composition"
operations = [
    { name = "seq_compose", work = "1 + W1 + W2", span = "1 + S1 + S2", notes = "sequential: span adds" },
    { name = "par_compose", work = "1 + W1 + W2", span = "1 + max(S1,S2)", notes = "parallel: span takes max" },
]

[[cost_spec]]
ref = "Ch2 Ex 2.8"
chapter = 2
description = "Parallel merge sort"
operations = [
    { name = "merge_sort", work = "O(n lg n)", span = "O(lg^2 n)" },
]

