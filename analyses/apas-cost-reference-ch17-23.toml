# APAS Cost Reference — Chapters 17–23
#
# Extracted from APAS study materials. Each entry cites the textbook reference.
#
# Notation:
#   n = |a| or max(|a|, |b|)
#   lg = log base 2
#   W(f(x)) = work of applying f to x
#   S(f(x)) = span of applying f to x

# ---------------------------------------------------------------------------
# Ch19: Flatten (Alg 19.15)
# ---------------------------------------------------------------------------

[[cost_spec]]
ref = "Ch19 Alg 19.15"
chapter = 19
description = "Array-sequence flatten implementation"
operations = [
    { name = "flatten", work = "O(|a| + sum |a[i]|)", span = "O(lg |a|)", notes = "uses scan to compute starting positions" },
]

# ---------------------------------------------------------------------------
# Ch20: Sequences (CS 20.2–20.7)
# ---------------------------------------------------------------------------

[[cost_spec]]
ref = "Ch20 CS 20.2"
chapter = 20
description = "Array-sequence cost specification: basic operations"
operations = [
    { name = "length",      work = "O(1)", span = "O(1)" },
    { name = "nth",         work = "O(1)", span = "O(1)" },
    { name = "empty",       work = "O(1)", span = "O(1)" },
    { name = "singleton",   work = "O(1)", span = "O(1)" },
    { name = "isEmpty",     work = "O(1)", span = "O(1)" },
    { name = "isSingleton", work = "O(1)", span = "O(1)" },
    { name = "subseq",      work = "O(1)", span = "O(1)" },
]

[[cost_spec]]
ref = "Ch20 CS 20.2"
chapter = 20
description = "Array-sequence cost specification: higher-order operations"
operations = [
    { name = "tabulate f n", work = "O(1 + Sigma W(f(i)))", span = "O(1 + max S(f(i)))" },
    { name = "map f a",      work = "O(1 + Sigma W(f(x)))", span = "O(1 + max S(f(x)))" },
    { name = "filter f a",   work = "O(1 + Sigma W(f(x)))", span = "O(lg |a| + max S(f(x)))", notes = "lg |a| from compaction" },
]

[[cost_spec]]
ref = "Ch20 CS 20.2"
chapter = 20
description = "Array-sequence cost specification: combining operations"
operations = [
    { name = "append a b",    work = "O(|a| + |b|)", span = "O(1)" },
    { name = "flatten a",     work = "O(|a| + sum |a[i]|)", span = "O(lg |a|)" },
    { name = "update a (i,x)", work = "O(|a|)", span = "O(1)", notes = "functional: full copy" },
    { name = "inject a b",    work = "O(|a| + |b|)", span = "O(lg(degree(b)))", notes = "degree = max updates per position" },
    { name = "ninject a b",   work = "O(|a| + |b|)", span = "O(1)", notes = "nondeterministic" },
]

[[cost_spec]]
ref = "Ch20 CS 20.3"
chapter = 20
description = "Array-sequence iterate (inherently sequential)"
operations = [
    { name = "iterate f x a", work = "O(1 + Sigma W(f))", span = "O(1 + Sigma S(f))", notes = "span sums because sequential" },
]

[[cost_spec]]
ref = "Ch20 CS 20.4"
chapter = 20
description = "Array-sequence reduce (parallel)"
operations = [
    { name = "reduce f x a", work = "O(1 + Sigma W(f))", span = "O(lg |a| * max S(f))", notes = "log-depth tree of combines" },
]

[[cost_spec]]
ref = "Ch20 CS 20.5"
chapter = 20
description = "Array-sequence scan"
operations = [
    { name = "scan f x a", work = "O(|a|)", span = "O(lg |a|)", notes = "assumes f is O(1)" },
]

[[cost_spec]]
ref = "Ch20 CS 20.6"
chapter = 20
description = "Array-sequence collect (sort-based grouping)"
operations = [
    { name = "collect cmp a", work = "O(W(cmp) * |a| * lg |a|)", span = "O(S(cmp) * lg^2 |a|)", notes = "dominated by comparison sort" },
]

[[cost_spec]]
ref = "Ch20 CS 20.6"
chapter = 20
description = "Tree-sequence cost specification: key differences from array-sequence"
operations = [
    { name = "nth",     work = "O(lg |a|)", span = "O(lg |a|)" },
    { name = "append",  work = "O(|lg(|a|/|b|)|)", span = "O(|lg(|a|/|b|)|)", notes = "logarithmic ratio" },
    { name = "update",  work = "O(lg |a|)", span = "O(lg |a|)" },
    { name = "subseq",  work = "O(lg |a|)", span = "O(lg |a|)" },
    { name = "inject",  work = "O((|a|+|b|) * lg |a|)", span = "O(lg(|a|+|b|))" },
    { name = "ninject", work = "O((|a|+|b|) * lg |a|)", span = "O(lg(|a|+|b|))" },
]

[[cost_spec]]
ref = "Ch20 CS 20.7"
chapter = 20
description = "List-sequence cost specification (inherently sequential)"
operations = [
    { name = "nth",     work = "O(i)", span = "O(i)" },
    { name = "subseq",  work = "O(i)", span = "O(i)" },
    { name = "append",  work = "O(|a|)", span = "O(|a|)" },
    { name = "tabulate", work = "O(Sigma W(f))", span = "O(Sigma S(f))", notes = "span sums; no parallelism" },
    { name = "map",     work = "O(Sigma W(f))", span = "O(Sigma S(f))" },
    { name = "filter",  work = "O(Sigma W(f))", span = "O(Sigma S(f))" },
    { name = "reduce",  work = "O(Sigma W(f))", span = "O(Sigma S(f))" },
    { name = "scan",    work = "O(|a|)", span = "O(|a|)" },
]

# ---------------------------------------------------------------------------
# Ch21: Primes (Alg 21.4–21.6)
# ---------------------------------------------------------------------------

[[cost_spec]]
ref = "Ch21 Alg 21.4"
chapter = 21
description = "Brute-force primality test"
operations = [
    { name = "isPrime", work = "O(sqrt(n))", span = "O(lg n)" },
]

[[cost_spec]]
ref = "Ch21 Alg 21.5"
chapter = 21
description = "Brute-force primes via filter"
operations = [
    { name = "primesBF", work = "O(n^(3/2))", span = "O(lg n)" },
]

[[cost_spec]]
ref = "Ch21 Alg 21.6"
chapter = 21
description = "Sieve of Eratosthenes using ninject"
operations = [
    { name = "primeSieve", work = "O(n lg n)", span = "O(lg n)" },
]

# ---------------------------------------------------------------------------
# Ch22: Single-Threaded Array Sequences (CS 22.2)
# ---------------------------------------------------------------------------

[[cost_spec]]
ref = "Ch22 CS 22.2"
chapter = 22
description = "Single-threaded array sequence (ephemeral)"
operations = [
    { name = "fromSeq", work = "O(|a|)", span = "O(1)" },
    { name = "toSeq",   work = "O(|a|)", span = "O(1)" },
    { name = "nth",     work = "O(1)", span = "O(1)", notes = "O(1) for latest version" },
    { name = "update",  work = "O(1)", span = "O(1)", notes = "in-place mutation" },
    { name = "inject",  work = "O(|b|)", span = "O(lg(degree(b)))" },
]

# ---------------------------------------------------------------------------
# Ch23: Primitive Tree Sequences (CS 23.2)
# ---------------------------------------------------------------------------

[[cost_spec]]
ref = "Ch23 CS 23.2"
chapter = 23
description = "Primitive tree sequence (expose/join interface)"
operations = [
    { name = "length", work = "O(1)", span = "O(1)" },
    { name = "expose", work = "O(1)", span = "O(1)" },
    { name = "join(Zero)", work = "O(1)", span = "O(1)" },
    { name = "join(One(x))", work = "O(1)", span = "O(1)" },
    { name = "join(Two(L,R))", work = "O(|r(L) - r(R)|)", span = "O(|r(L) - r(R)|)", notes = "r(T) = rank; O(1) when ranks equal" },
]
