# APAS Cost Reference — Chapters 37–44
#
# Extracted from APAS study materials. Each entry cites the textbook reference
# (CS = Cost Specification, Alg = Algorithm, DT = Data Type).
#
# Notation:
#   n = |a| or max(|a|, |b|)
#   m = min(|a|, |b|)
#   lg = log base 2
#   W(f(x)) = work of applying f to x
#   S(f(x)) = span of applying f to x
#
# This file is the single source of truth for "what does APAS say."
# Generated once, human-reviewed, then frozen.

# ---------------------------------------------------------------------------
# Ch37: BST Introduction (DT 37.7, Alg 37.4)
# ---------------------------------------------------------------------------

[[cost_spec]]
ref = "Ch37 Alg 37.4"
chapter = 37
description = "BST find — root-to-leaf path"
operations = [
    { name = "find", work = "O(h(T))", span = "O(h(T))", notes = "h(T) = height; O(lg n) when balanced" },
]

# ---------------------------------------------------------------------------
# Ch38: Parametric BSTs (CS 38.11)
# ---------------------------------------------------------------------------

[[cost_spec]]
ref = "Ch38 CS 38.11"
chapter = 38
description = "Parametric BST cost specification (balanced BST via joinMid)"
operations = [
    { name = "empty",        work = "O(1)",             span = "O(1)" },
    { name = "singleton",    work = "O(1)",             span = "O(1)" },
    { name = "split",        work = "O(lg |t|)",        span = "O(lg |t|)" },
    { name = "join",         work = "O(lg(|t1|+|t2|))", span = "O(lg(|t1|+|t2|))" },
    { name = "joinM",        work = "O(lg(|t1|+|t2|))", span = "O(lg(|t1|+|t2|))" },
    { name = "joinPair",     work = "O(lg(|t1|+|t2|))", span = "O(lg(|t1|+|t2|))" },
    { name = "find",         work = "O(lg |t|)",        span = "O(lg |t|)" },
    { name = "insert",       work = "O(lg |t|)",        span = "O(lg |t|)" },
    { name = "delete",       work = "O(lg |t|)",        span = "O(lg |t|)" },
    { name = "union",        work = "O(m * lg(n/m))",   span = "O(lg n)" },
    { name = "intersect",    work = "O(m * lg(n/m))",   span = "O(lg n)" },
    { name = "difference",   work = "O(m * lg(n/m))",   span = "O(lg n)" },
    { name = "filter",       work = "O(Σ W(f(x)))",     span = "O(lg |t| + max S(f(x)))" },
    { name = "reduce",       work = "O(Σ W(f(x)))",     span = "O(lg |t| + max S(f(x)))" },
]

# Treap-specific costs (Ch39)
[[cost_spec]]
ref = "Ch39 DS 39.3"
chapter = 39
description = "Treap implementation of parametric BST — w.h.p. bounds"
operations = [
    { name = "join",    work = "O(lg(|t1|+|t2|))", span = "O(lg(|t1|+|t2|))", notes = "bounded by h(t1)+h(t2); w.h.p." },
    { name = "split",   work = "O(lg |t|)",         span = "O(lg |t|)",         notes = "joinM at each level is O(1) due to priority ordering" },
    { name = "expose",  work = "O(1)",              span = "O(1)" },
    { name = "joinMid", work = "O(lg(|t1|+|t2|))", span = "O(lg(|t1|+|t2|))", notes = "delegates to join" },
]

